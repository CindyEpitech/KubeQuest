apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Run argocd-server in HTTP (insecure) mode. TLS is terminated at the nginx
  # ingress instead, which keeps ArgoCD consistent with the other plain-HTTP
  # *.kubequest.local services and avoids needing ssl-passthrough on the
  # ingress controller.
  server.insecure: "true"
