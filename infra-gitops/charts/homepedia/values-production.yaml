# Production overrides consumed by the ArgoCD "homepedia" Application.
# This is the file the promote workflow bumps to roll out a new image tag.
frontend:
  image:
    repository: 10.0.9.227:5000/homepedia-frontend
    tag: v0.1.1
  # Single shared worker node: a 2-replica HA frontend + the surge pod doesn't fit
  # (node ~93% memory) and the maxUnavailable:0 rollout deadlocks. HA isn't real on
  # one node anyway, so pin to a single replica. HPA must drive replicas to 1
  # because the Application ignores /spec/replicas.
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  # INTERIM: the /api/geo/prices/communes default view serialises full-resolution
  # geometry for all ~35k communes (~26MB) and heap-OOMs the 512Mi pod (which on a
  # single replica briefly takes all of prod down). Bumped to 1Gi until the frontend
  # image ships geometry simplification (ST_SimplifyPreserveTopology) — that fix
  # makes 512Mi sufficient again, so revert this once the new image is live.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Right-size the DBs down for the shared worker node (same as dev).
postgres:
  resources:
    requests:
      cpu: "50m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
mongodb:
  resources:
    requests:
      cpu: "50m"
      memory: "160Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Secrets are pre-created in the homepedia namespace (not managed by GitOps).
# See infra-gitops/argocd/README.md.
secret:
  create: false

# TLS on homepedia.kubequest.local via cert-manager's CA issuer.
ingress:
  tls:
    enabled: true

# Lock DB access to the frontend only (bonus). Validated on dev first.
networkPolicy:
  enabled: true
