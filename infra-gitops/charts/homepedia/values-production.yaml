# Production overrides consumed by the ArgoCD "homepedia" Application.
# This is the file the promote workflow bumps to roll out a new image tag.
frontend:
  image:
    repository: 10.0.9.227:5000/homepedia-frontend
    tag: v0.1.1
  # Single shared worker node: a 2-replica HA frontend + the surge pod doesn't fit
  # (node ~93% memory) and the maxUnavailable:0 rollout deadlocks. HA isn't real on
  # one node anyway, so pin to a single replica. HPA must drive replicas to 1
  # because the Application ignores /spec/replicas.
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  # 1Gi (NOT the base 512Mi): the /api/geo/prices/communes default view returns all
  # ~35k communes in one response, which heap-OOMs a 512Mi pod (on a single replica
  # that briefly takes all of prod down). The v0.1.2 geometry simplification
  # (ST_Simplify..., 26MB->6.7MB) helps but ~13MB of per-feature properties remain,
  # so the response is still ~20MB and peaks ~446MiB RSS under concurrent load
  # (measured on v0.1.2 in dev). Do NOT drop to 512Mi unless the response is trimmed
  # further (fewer default properties / server-side paging). Prod still runs v0.1.1
  # here; bump to the simplified image with the Mapbox-token rebuild.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Right-size the DBs down for the shared worker node (same as dev).
postgres:
  resources:
    requests:
      cpu: "50m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
mongodb:
  resources:
    requests:
      cpu: "50m"
      memory: "160Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Secrets are pre-created in the homepedia namespace (not managed by GitOps).
# See infra-gitops/argocd/README.md.
secret:
  create: false

# TLS on homepedia.kubequest.local via cert-manager's CA issuer.
ingress:
  tls:
    enabled: true

# Lock DB access to the frontend only (bonus). Validated on dev first.
networkPolicy:
  enabled: true
