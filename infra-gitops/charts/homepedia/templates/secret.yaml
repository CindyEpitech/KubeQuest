{{- if .Values.secret.create }}
# Rendered only when secret.create=true (local Helm / deploy.sh --set ...).
# Under GitOps (ArgoCD) secret.create=false and these are pre-created in the
# namespace — see infra-gitops/argocd/README.md.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homepedia.fullname" . }}-secret
  labels:
    {{- include "homepedia.labels" . | nindent 4 }}
type: Opaque
data:
  # Postgres user password — consumed by the frontend (PG_PASSWORD / POSTGRES_PASSWORD)
  # and by the postgres container (POSTGRES_PASSWORD).
  pg-password: {{ .Values.secret.pgPassword | b64enc }}
  # Mongo root password — consumed by the mongo container.
  mongo-root-password: {{ .Values.secret.mongoRootPassword | b64enc }}
  # Full Mongo connection string consumed by the frontend (lib/mongo.ts).
  mongo-uri: {{ printf "mongodb://%s:%s@%s:27017/?authSource=admin" .Values.mongodb.auth.rootUser .Values.secret.mongoRootPassword (include "homepedia.mongoHost" .) | b64enc }}
{{- end }}
