apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homepedia.fullname" . }}
  labels:
    {{- include "homepedia.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "homepedia.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime rolling update
  minReadySeconds: 10
  template:
    metadata:
      labels:
        {{- include "homepedia.selectorLabels" . | nindent 8 }}
    spec:
      # Keep off ingress/monitoring nodes; spread replicas across the rest.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: NotIn
                    values:
                      {{- toYaml .Values.nodeAffinityRoleExclude | nindent 22 }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "homepedia.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Wait for both databases before starting the app.
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              {{- if .Values.postgres.enabled }}
              until nc -z {{ include "homepedia.postgresHost" . }} 5432; do
                echo "Waiting for Postgres..."; sleep 3
              done
              {{- end }}
              {{- if .Values.mongodb.enabled }}
              until nc -z {{ include "homepedia.mongoHost" . }} 27017; do
                echo "Waiting for Mongo..."; sleep 3
              done
              {{- end }}
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"

      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP

          # Non-sensitive config
          envFrom:
            - configMapRef:
                name: {{ include "homepedia.fullname" . }}-config

          # Sensitive values from the Secret
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "homepedia.fullname" . }}-secret
                  key: pg-password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "homepedia.fullname" . }}-secret
                  key: pg-password
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "homepedia.fullname" . }}-secret
                  key: mongo-uri

          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.probes.readiness.path }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.probes.liveness.path }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
