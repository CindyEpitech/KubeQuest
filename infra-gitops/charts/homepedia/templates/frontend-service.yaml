apiVersion: v1
kind: Service
metadata:
  name: {{ include "homepedia.fullname" . }}
  labels:
    {{- include "homepedia.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "homepedia.selectorLabels" . | nindent 4 }}
