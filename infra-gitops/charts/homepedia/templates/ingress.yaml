{{- if .Values.ingress.enabled }}
{{- $tlsSecret := .Values.ingress.tls.secretName | default (printf "%s-tls" (include "homepedia.fullname" .)) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "homepedia.fullname" . }}
  labels:
    {{- include "homepedia.labels" . | nindent 4 }}
  {{- if .Values.ingress.tls.enabled }}
  annotations:
    # cert-manager (ingress-shim) issues the cert from the cluster CA issuer and
    # writes it to the TLS secret below. ssl-redirect stays off so plain HTTP keeps
    # working alongside HTTPS.
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    cert-manager.io/common-name: {{ .Values.ingress.host | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.tls.sslRedirect | quote }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ $tlsSecret }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "homepedia.fullname" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
