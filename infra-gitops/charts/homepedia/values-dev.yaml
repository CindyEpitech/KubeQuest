# Dev overrides consumed by the ArgoCD "homepedia-dev" Application (tracks develop).
# Deploys into the homepedia-dev namespace with its own ingress host.
frontend:
  image:
    repository: 10.0.9.227:5000/homepedia-frontend
    tag: v0.1.3
  # Single memory-constrained worker node: no HA in dev, pin to one pod. The HPA
  # must actively drive replicas to 1 because the ArgoCD app ignores /spec/replicas.
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  # 1Gi (NOT the base 512Mi): the /api/geo/prices/communes default view returns all
  # ~35k communes in one response. v0.1.2 simplified the geometry (ST_Simplify...,
  # 26MB->6.7MB), but ~13MB of per-feature properties remain, so the response is
  # still ~20MB and peaks ~446MiB RSS under concurrent load (measured on v0.1.2).
  # That is too close to 512Mi to be safe. Do NOT drop to 512Mi unless the response
  # is trimmed further (e.g. fewer default properties / server-side paging).
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Secrets are pre-created in the homepedia-dev namespace (not managed by GitOps).
secret:
  create: false

# Separate hostname so dev doesn't collide with prod's homepedia.kubequest.local.
ingress:
  host: homepedia-dev.kubequest.local
  tls:
    enabled: true

# Lock DB access to the frontend only (bonus). Validated here on dev first.
networkPolicy:
  enabled: true

# Right-size the databases down for the shared worker node.
postgres:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: "50m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

mongodb:
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "50m"
      memory: "160Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
