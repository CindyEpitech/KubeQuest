# Dev overrides consumed by the ArgoCD "homepedia-dev" Application (tracks develop).
# Deploys into the homepedia-dev namespace with its own ingress host.
frontend:
  image:
    repository: 10.0.9.227:5000/homepedia-frontend
    tag: v0.1.0
  # Single memory-constrained worker node: no HA in dev, pin to one pod. The HPA
  # must actively drive replicas to 1 because the ArgoCD app ignores /spec/replicas.
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1

# Secrets are pre-created in the homepedia-dev namespace (not managed by GitOps).
secret:
  create: false

# Separate hostname so dev doesn't collide with prod's homepedia.kubequest.local.
ingress:
  host: homepedia-dev.kubequest.local
  tls:
    enabled: true

# Lock DB access to the frontend only (bonus). Validated here on dev first.
networkPolicy:
  enabled: true

# Right-size the databases down for the shared worker node.
postgres:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: "50m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

mongodb:
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "50m"
      memory: "160Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
