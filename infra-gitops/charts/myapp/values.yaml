# ── Application ──────────────────────────────────────────────
replicaCount: 2

image:
  repository: registry.gitlab.com/your-group/myapp   # overridden by CI
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 80

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: app.kubequest.local
  path: /
  pathType: Prefix
  # TLS via cert-manager's self-signed CA (see base/cert-manager). Off by
  # default; the dev/prod values turn it on. sslRedirect stays false so HTTP
  # keeps working next to HTTPS (load-test / demo probers hit plain HTTP).
  tls:
    enabled: false
    clusterIssuer: kubequest-ca
    sslRedirect: false
    secretName: ""        # defaults to <release>-myapp-tls

# ── Network policy (bonus: restrict who can reach MySQL) ──────
# Default-deny ingress to MySQL, allowing only the app + backup pods on 3306.
# Off by default; enable per-environment after confirming the app stays healthy.
networkPolicy:
  enabled: false

# ── RBAC (bonus: least-privilege operator SA for this namespace) ──
# Creates a namespaced operator ServiceAccount/Role/RoleBinding. Additive (grants
# a new scoped identity; restricts no one), so safe to enable everywhere.
rbac:
  create: false

# ── Resources (required by OPA policy) ───────────────────────
resources:
  requests:
    cpu: "100m"
    # Right-sized to ~2x real usage (~130Mi observed). The 512Mi reservation was
    # ~4x actual and starved the single shared worker node. Limit stays 1Gi so
    # burst headroom / OOM protection is unchanged.
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

# ── HPA ───────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# ── Laravel application config (non-sensitive) ────────────────
config:
  appEnv: production
  appDebug: "false"
  appUrl: "http://app.kubequest.local"
  dbConnection: mysql
  dbPort: "3306"
  dbDatabase: app_database
  dbUsername: app_user

# ── Secrets (injected at deploy time — never committed) ───────
secret:
  # create=true: chart renders the Secret objects from the values below
  #   (used by deploy.sh, which injects the real values via --set).
  # create=false: the Secret is assumed to already exist in the namespace
  #   (used by the ArgoCD GitOps flow — see infra-gitops/argocd/).
  create: true
  appKey: ""          # base64:... Laravel app key
  dbPassword: ""
  dbRootPassword: ""

# ── MySQL ──────────────────────────────────
mysql:
  enabled: false

# ── DB backup CronJob ─────────────────────────────────────────
backup:
  enabled: true
  schedule: "0 2 * * *"
  pvcName: myapp-backup-pvc
  pvcSize: 2Gi

# ── Probes ─────────────────────────────────────────
probes:
  readiness:
    path: /
  liveness:
    path: /
