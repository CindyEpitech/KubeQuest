{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "myapp.fullname" . }}-db-backup
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Clean up finished backup pods so they don't linger. Lingering Completed
      # pods have no CPU metrics and, if they match the web Deployment selector,
      # the HPA treats them as 100% and refuses to scale down.
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          # IMPORTANT: do NOT use myapp.selectorLabels here. That is the web
          # Deployment's selector ({name, instance}); if backup pods carry it the
          # HPA counts them. Use name + component only (no instance) so these
          # pods never match the Deployment/Service selector.
          labels:
            app.kubernetes.io/name: {{ include "myapp.name" . }}
            app.kubernetes.io/component: db-backup
        spec:
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
                      - key: role
                        operator: DoesNotExist
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          containers:
            - name: db-backup
              image: 10.0.9.227:5000/mysql:8.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mysqldump --no-tablespaces -h $DB_HOST -P $DB_PORT -u $DB_USERNAME -p$DB_PASSWORD $DB_DATABASE \
                    > /backup/backup-$(date +%Y%m%d-%H%M%S).sql
                  echo "Backup done."
                  # Keep only last 7 backups
                  ls -t /backup/*.sql | tail -n +8 | xargs -r rm
              envFrom:
                - configMapRef:
                    name: myapp-config
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: myapp-db-secret
                      key: mysql-password
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ .Values.backup.pvcName }}
{{- end }}
