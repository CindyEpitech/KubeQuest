{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: myapp-secret
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
type: Opaque
data:
  app-key: {{ .Values.secret.appKey | b64enc }}
---
# Consumed by the Bitnami MySQL subchart via existingSecret
apiVersion: v1
kind: Secret
metadata:
  name: myapp-db-secret
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
type: Opaque
data:
  mysql-password: {{ .Values.secret.dbPassword | b64enc }}
  mysql-root-password: {{ .Values.secret.dbRootPassword | b64enc }}
{{- end }}