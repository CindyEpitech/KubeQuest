# Production overrides consumed by the ArgoCD "myapp" Application.
# This is the file CI (Phase D.1) bumps to roll out a new image tag under GitOps.
image:
  repository: 10.0.9.227:5000/myapp
  tag: v1.0.0

# Secrets are pre-created in the myapp namespace (not managed by GitOps).
# See infra-gitops/argocd/README.md.
secret:
  create: false

# MySQL is managed outside this release.
mysql:
  enabled: false

# TLS on app.kubequest.local via cert-manager's CA issuer (bonus).
ingress:
  tls:
    enabled: true

# MySQL NetworkPolicy (bonus). Leave off until it's been validated on dev
# (myapp-dev); flip to true once the dev app is confirmed healthy with it on.
networkPolicy:
  enabled: false

# Least-privilege operator SA scoped to the myapp namespace (bonus). Additive.
rbac:
  create: true
