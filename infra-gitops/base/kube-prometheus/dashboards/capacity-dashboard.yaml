apiVersion: v1
kind: ConfigMap
metadata:
  name: kubequest-capacity-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  capacity-dashboard.json: |
    {
      "annotations": { "list": [] },
      "description": "KubeQuest capacity: per-pod memory vs requests/limits, node headroom, OOM risk on the shared worker",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "gauge",
          "title": "Node Memory Headroom",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.15 },
                  { "color": "green", "value": 0.3 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto" },
          "targets": [
            {
              "expr": "node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory: Requests vs Limits vs Allocatable (per node)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 5 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "allocatable" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }, { "id": "custom.lineStyle", "value": { "fill": "dash" } }] }
            ]
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\"}) by (node)",
              "legendFormat": "requests {{ node }}",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{resource=\"memory\"}) by (node)",
              "legendFormat": "limits {{ node }}",
              "refId": "B"
            },
            {
              "expr": "sum(kube_node_status_allocatable{resource=\"memory\"}) by (node)",
              "legendFormat": "allocatable",
              "refId": "C"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Memory Usage as % of Limit (per pod)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "custom": { "lineWidth": 2 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.9 }] }
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}) by (pod) / sum(kube_pod_container_resource_limits{namespace=~\"$namespace\", resource=\"memory\"}) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "table",
          "title": "Top 15 Memory Pods (working set vs request/limit)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "pod" }, "properties": [{ "id": "custom.width", "value": 300 }] }
            ]
          },
          "options": { "sortBy": [{ "displayName": "working_set", "desc": true }], "footer": {} },
          "transformations": [
            { "id": "seriesToColumns", "options": { "byField": "pod" } },
            { "id": "organize", "options": { "renameByName": { "Value #A": "working_set", "Value #B": "request", "Value #C": "limit" } } }
          ],
          "targets": [
            {
              "expr": "topk(15, sum(container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}) by (pod))",
              "refId": "A",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=~\"$namespace\", resource=\"memory\"}) by (pod)",
              "refId": "B",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=~\"$namespace\", resource=\"memory\"}) by (pod)",
              "refId": "C",
              "instant": true,
              "format": "table"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "OOMKilled Events (last 1 h)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 17 },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 2, "drawStyle": "bars" }, "color": { "mode": "fixed", "fixedColor": "red" } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"}[1h])",
              "legendFormat": "{{ namespace }}/{{ pod }} ({{ container }})",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubequest", "custom", "capacity"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": { "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(kube_pod_info, namespace)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".+",
            "label": "Namespace",
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": { "query": "label_values(kube_pod_info, namespace)", "refId": "Prometheus-namespace-Variable-Query" },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "KubeQuest — Capacity",
      "uid": "kubequest-capacity",
      "version": 1
    }
