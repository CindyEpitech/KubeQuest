apiVersion: v1
kind: ConfigMap
metadata:
  name: kubequest-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app-dashboard.json: |
    {
      "annotations": { "list": [] },
      "description": "KubeQuest application metrics: request rate, latency, replicas, HPA",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (req/s)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"myapp\"}[2m])) by (status)",
              "legendFormat": "HTTP {{ status }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "p95 Latency (s)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{namespace=\"myapp\"}[2m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{namespace=\"myapp\"}[2m])) by (le))",
              "legendFormat": "p50",
              "refId": "B"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Replica Count vs HPA Target",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0, "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"myapp\"}",
              "legendFormat": "Current replicas",
              "refId": "A"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"myapp\"}",
              "legendFormat": "Desired replicas",
              "refId": "B"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"myapp\"}",
              "legendFormat": "Max replicas",
              "refId": "C"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Pod Restarts (last 1 h)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"myapp\"}[1h])",
              "legendFormat": "{{ pod }} / {{ container }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Live Replicas",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "colorMode": "value", "graphMode": "none" },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{namespace=\"myapp\", deployment=~\"myapp.*\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "CPU Usage — app pods",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 20, "x": 4, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"myapp\", container!=\"\", container!=\"POD\"}[2m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubequest", "custom", "app"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "KubeQuest — App",
      "uid": "kubequest-app",
      "version": 1
    }
