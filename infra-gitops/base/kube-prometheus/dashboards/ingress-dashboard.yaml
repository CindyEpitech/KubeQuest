apiVersion: v1
kind: ConfigMap
metadata:
  name: kubequest-ingress-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ingress-dashboard.json: |
    {
      "annotations": { "list": [] },
      "description": "KubeQuest ingress (nginx): request rate & error ratio per host, latency percentiles, connections",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate per Host (req/s)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 8 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{host=~\"$host\"}[2m])) by (host)",
              "legendFormat": "{{ host }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "5xx Error Ratio per Host",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "custom": { "lineWidth": 2 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.05 }] }
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"5..\", host=~\"$host\"}[2m])) by (host) / sum(rate(nginx_ingress_controller_requests{host=~\"$host\"}[2m])) by (host)",
              "legendFormat": "{{ host }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Request Latency Percentiles (s)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{host=~\"$host\"}[2m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{host=~\"$host\"}[2m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{host=~\"$host\"}[2m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Upstream Response Time p95 per Service (s)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_response_duration_seconds_bucket{host=~\"$host\"}[2m])) by (le, service))",
              "legendFormat": "{{ service }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Requests by Status Class",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 7, "w": 16, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 20, "stacking": { "mode": "normal" } } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "5xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }] },
              { "matcher": { "id": "byName", "options": "4xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }] },
              { "matcher": { "id": "byName", "options": "2xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }] }
            ]
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"2..\", host=~\"$host\"}[2m]))",
              "legendFormat": "2xx",
              "refId": "A"
            },
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"3..\", host=~\"$host\"}[2m]))",
              "legendFormat": "3xx",
              "refId": "B"
            },
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"4..\", host=~\"$host\"}[2m]))",
              "legendFormat": "4xx",
              "refId": "C"
            },
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{status=~\"5..\", host=~\"$host\"}[2m]))",
              "legendFormat": "5xx",
              "refId": "D"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Active Connections",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "targets": [
            {
              "expr": "sum(nginx_ingress_controller_nginx_process_connections{state=\"active\"})",
              "legendFormat": "active",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubequest", "ingress"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": { "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(nginx_ingress_controller_requests, host)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".+",
            "label": "Host",
            "multi": true,
            "name": "host",
            "options": [],
            "query": { "query": "label_values(nginx_ingress_controller_requests, host)", "refId": "Prometheus-host-Variable-Query" },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "KubeQuest — Ingress",
      "uid": "kubequest-ingress",
      "version": 1
    }
