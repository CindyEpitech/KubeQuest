apiVersion: v1
kind: ConfigMap
metadata:
  name: kubequest-infra-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  infra-dashboard.json: |
    {
      "annotations": { "list": [] },
      "description": "KubeQuest infrastructure: node CPU/memory, disk, network, top pods",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Node CPU Usage",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[2m])) by (instance)",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Node Memory Usage",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Disk Usage (root fs) per Node",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.85 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto" },
          "targets": [
            {
              "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|fuse.lxcfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|fuse.lxcfs\"})",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Network In / Out per Node",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "lineWidth": 2 } },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|tunl.*\"}[2m])) by (instance)",
              "legendFormat": "in  {{ instance }}",
              "refId": "A"
            },
            {
              "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|tunl.*\"}[2m])) by (instance)",
              "legendFormat": "out {{ instance }}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 5,
          "type": "table",
          "title": "Top 10 CPU-hungry Pods",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "pod" }, "properties": [{ "id": "custom.width", "value": 320 }] },
              { "matcher": { "id": "byName", "options": "namespace" }, "properties": [{ "id": "custom.width", "value": 140 }] }
            ]
          },
          "options": { "sortBy": [{ "displayName": "Value", "desc": true }], "footer": {} },
          "transformations": [
            { "id": "sortBy", "options": { "fields": [{ "displayName": "Value", "desc": true }] } },
            { "id": "limit", "options": { "limitCount": 10 } }
          ],
          "targets": [
            {
              "expr": "topk(10, sum(rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[2m])) by (pod, namespace))",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubequest", "infra"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "KubeQuest — Infra",
      "uid": "kubequest-infra",
      "version": 1
    }
