apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: dex
  labels:
    app.kubernetes.io/name: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dex
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.38.0
          args:
            - dex
            - serve
            - /etc/dex/config.yaml
          ports:
            - name: http
              containerPort: 5556
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: dex-config
              mountPath: /etc/dex
              readOnly: true
      volumes:
        - name: dex-config
          secret:
            secretName: dex-config
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: dex
  labels:
    app.kubernetes.io/name: dex
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dex
  ports:
    - name: http
      port: 5556
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dex
  namespace: dex
spec:
  ingressClassName: nginx
  rules:
    - host: dex.kubequest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dex
                port:
                  number: 5556
