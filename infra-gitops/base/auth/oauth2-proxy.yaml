apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2-proxy-dashboard
  namespace: oauth2-proxy
spec:
  ingressClassName: nginx
  rules:
    - host: dashboard.kubequest.local
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-dashboard
                port:
                  number: 4180
