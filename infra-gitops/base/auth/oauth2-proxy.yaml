apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-dashboard
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy-dashboard
    spec:
      hostAliases:
        - ip: "10.98.36.134"
          hostnames:
            - dex.kubequest.local
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=http://dex.kubequest.local
            - --client-id=oauth2-proxy
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --cookie-secure=false
            - --cookie-domain=.kubequest.local
            - --email-domain=*
            - --http-address=0.0.0.0:4180
            - --redirect-url=http://dashboard.kubequest.local/oauth2/callback
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --upstream=static://200
            - --whitelist-domain=.kubequest.local
          envFrom:
            - secretRef:
                name: oauth2-proxy-secrets
          ports:
            - name: http
              containerPort: 4180
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
