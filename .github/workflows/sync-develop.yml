name: Sync develop with main

# After anything lands on main (PR merges, promotion commits), bring those
# commits back into develop so the branches stay in lockstep. develop is a
# protected branch (required status checks), so we can't push to it directly —
# instead we open a main -> develop PR and let it auto-merge once CI is green.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-develop
  cancel-in-progress: false

jobs:
  sync:
    name: Open auto-merging sync PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open/refresh main -> develop sync PR with auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main develop

          # Nothing to do if develop already contains every commit on main.
          if [ -z "$(git rev-list origin/develop..origin/main)" ]; then
            echo "develop already contains main — nothing to sync."
            exit 0
          fi

          # Reuse an open sync PR if one exists, otherwise open one.
          PR=$(gh pr list --base develop --head main --state open \
                 --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            PR=$(gh pr create --base develop --head main \
                   --title "chore: sync develop with main" \
                   --body "Automated by the **Sync develop with main** workflow. Brings the merges/promotions on \`main\` back into \`develop\` so the branches stay in lockstep. Auto-merges once the required checks pass." \
                 | grep -oE '[0-9]+$')
            echo "Opened sync PR #$PR"
          else
            echo "Reusing existing sync PR #$PR"
          fi

          # Merge automatically once required checks pass (develop needs no approvals).
          gh pr merge "$PR" --auto --merge
          echo "Auto-merge enabled on PR #$PR — it merges when CI is green."
