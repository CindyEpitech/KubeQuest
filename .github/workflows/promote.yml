name: Promote dev tag to production

# When `main` receives a new dev image tag (i.e. you merged develop into main),
# open a PR that copies that tag into values-production.yaml. Once merged,
# ArgoCD's `myapp` app rolls it out — the same thing `./deploy.sh prod` does,
# minus the rebuild (the image already exists in the registry from the dev deploy).
on:
  push:
    branches: [main]
    paths:
      - infra-gitops/charts/myapp/values-dev.yaml

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Open prod promotion PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Promote dev tag into values-production.yaml
        id: promote
        run: |
          set -euo pipefail
          DEV_VALUES=infra-gitops/charts/myapp/values-dev.yaml
          PROD_VALUES=infra-gitops/charts/myapp/values-production.yaml

          DEV_TAG=$(sed -n -E 's/^[[:space:]]*tag:[[:space:]]*//p' "$DEV_VALUES" | head -1 | tr -d '"')
          [ -z "$DEV_TAG" ] && { echo "Could not read tag from $DEV_VALUES"; exit 1; }
          echo "Dev tag is $DEV_TAG"

          sed -i -E "s|^([[:space:]]*tag:[[:space:]]*).*|\1$DEV_TAG|" "$PROD_VALUES"

          if git diff --quiet -- "$PROD_VALUES"; then
            echo "Production already at $DEV_TAG — nothing to promote."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Open promotion PR
        if: steps.promote.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: promote/prod-${{ steps.promote.outputs.tag }}
          commit-message: "chore(deploy): promote prod image tag -> ${{ steps.promote.outputs.tag }}"
          title: "chore(deploy): promote prod image tag -> ${{ steps.promote.outputs.tag }}"
          body: |
            Auto-generated by the **Promote dev tag to production** workflow.

            `develop` was merged into `main`, so this promotes the dev image tag
            into `values-production.yaml`. Merging this PR rolls it out to prod via
            ArgoCD (`myapp`). The image already exists in the registry from the dev
            deploy — no rebuild needed.

            - Tag: `${{ steps.promote.outputs.tag }}`
          labels: deploy,automated
