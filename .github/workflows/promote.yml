name: Promote dev tag to production

# When `main` receives a new dev image tag (i.e. you merged develop into main),
# open a PR that copies that tag into the matching chart's values-production.yaml.
# Once merged, ArgoCD's prod app rolls it out — the same thing the deploy scripts
# do for dev, minus the rebuild (the image already exists in the registry).
#
# Covers both charts. Each runs only when ITS own values-dev.yaml changed in the
# push, so a myapp deploy never opens a homepedia PR and vice-versa.
on:
  push:
    branches: [main]
    paths:
      - infra-gitops/charts/myapp/values-dev.yaml
      - infra-gitops/charts/homepedia/values-dev.yaml

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Open prod promotion PR (${{ matrix.chart }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: [myapp, homepedia]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # need history to diff the pushed range

      - name: Did this chart's dev values change in this push?
        id: changed
        run: |
          set -euo pipefail
          DEV_VALUES=infra-gitops/charts/${{ matrix.chart }}/values-dev.yaml
          BEFORE='${{ github.event.before }}'
          # On a brand-new/zeroed before-SHA, fall back to reconciling.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable before-SHA — will reconcile ${{ matrix.chart }}."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE" '${{ github.sha }}' | grep -qx "$DEV_VALUES"; then
            echo "$DEV_VALUES changed in this push."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "$DEV_VALUES unchanged — skipping ${{ matrix.chart }}."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote dev tag into values-production.yaml
        id: promote
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          DEV_VALUES=infra-gitops/charts/${{ matrix.chart }}/values-dev.yaml
          PROD_VALUES=infra-gitops/charts/${{ matrix.chart }}/values-production.yaml

          DEV_TAG=$(sed -n -E 's/^[[:space:]]*tag:[[:space:]]*//p' "$DEV_VALUES" | head -1 | tr -d '"')
          [ -z "$DEV_TAG" ] && { echo "Could not read tag from $DEV_VALUES"; exit 1; }
          echo "Dev tag is $DEV_TAG"

          sed -i -E "s|^([[:space:]]*tag:[[:space:]]*).*|\1$DEV_TAG|" "$PROD_VALUES"

          if git diff --quiet -- "$PROD_VALUES"; then
            echo "Production already at $DEV_TAG — nothing to promote."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Open promotion PR
        if: steps.promote.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: promote/${{ matrix.chart }}-prod-${{ steps.promote.outputs.tag }}
          add-paths: infra-gitops/charts/${{ matrix.chart }}/values-production.yaml
          commit-message: "chore(deploy): promote ${{ matrix.chart }} prod image tag -> ${{ steps.promote.outputs.tag }}"
          title: "chore(deploy): promote ${{ matrix.chart }} prod image tag -> ${{ steps.promote.outputs.tag }}"
          body: |
            Auto-generated by the **Promote dev tag to production** workflow.

            `develop` was merged into `main`, so this promotes the **${{ matrix.chart }}**
            dev image tag into its `values-production.yaml`. Merging this PR rolls it
            out to prod via ArgoCD. The image already exists in the registry from the
            dev deploy — no rebuild needed.

            - Chart: `${{ matrix.chart }}`
            - Tag: `${{ steps.promote.outputs.tag }}`
          labels: deploy,automated
